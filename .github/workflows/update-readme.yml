name: Update README Scope

on:
  push:
    branches:
      - 'master'

permissions:
  contents: write

jobs:
  update-readme:
    name: Update
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Generate Scope table
        shell: pwsh
        run: ./bin/update-readme.ps1

      - name: Commit changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if (-not (git diff --cached --quiet)) {
              git commit -m "docs: update Scope table [skip ci]"
              git push
          }
